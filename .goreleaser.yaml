version: 2

project_name: dci

before:
  hooks:
    - go test ./...

builds:
  - id: dci
    main: .
    binary: dci
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Os "darwin" }}
          {{- if eq .Arch "amd64" }}CC=o64-clang
          {{- else }}CC=oa64-clang
          {{- end }}
        {{- else if eq .Os "linux" }}
          {{- if eq .Arch "amd64" }}CC=x86_64-linux-gnu-gcc
          {{- else }}CC=aarch64-linux-gnu-gcc
          {{- end }}
        {{- else if eq .Os "windows" }}CC=x86_64-w64-mingw32-gcc
        {{- end }}
      - >-
        {{- if eq .Os "darwin" }}
          {{- if eq .Arch "amd64" }}CXX=o64-clang++
          {{- else }}CXX=oa64-clang++
          {{- end }}
        {{- else if eq .Os "linux" }}
          {{- if eq .Arch "amd64" }}CXX=x86_64-linux-gnu-g++
          {{- else }}CXX=aarch64-linux-gnu-g++
          {{- end }}
        {{- else if eq .Os "windows" }}CXX=x86_64-w64-mingw32-g++
        {{- end }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # goreleaser-cross is missing the llvm-mingw ARM64 compiler
      # (https://github.com/goreleaser/goreleaser-cross/issues/117).
      # Re-enable when the upstream image ships aarch64-w64-mingw32-gcc.
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: bundle
    ids:
      - dci
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: doitintl
    name: dci-cli
  draft: false
  prerelease: auto

nfpms:
  - id: linux-packages
    ids:
      - dci
    package_name: dci
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    homepage: https://github.com/doitintl/dci-cli
    maintainer: DoiT
    description: DoiT Cloud Intelligence CLI
    vendor: DoiT
    file_name_template: "{{ .PackageName }}_{{ .Version }}_linux_{{ .Arch }}.{{ .Format }}"
    contents:
      - src: ./README.md
        dst: /usr/share/doc/dci/README.md
