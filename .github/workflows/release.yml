name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release via goreleaser-cross
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e CGO_ENABLED=1 \
            ghcr.io/goreleaser/goreleaser-cross:v1.25.7 \
            release --clean

      - name: Trigger downstream workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh workflow run "Sync Package Manifests" --field tag="$tag"
          gh workflow run "Post-release Verify" --field tag="$tag"
